{% load static i18n %}
<!-- Start Sidebar -->
<aside
    id="app-menu"
    class="hs-overlay fixed inset-y-0 start-0 z-60 hidden w-sidenav min-w-sidenav shadow shadow-default-900/2 bg-white border-e border-default-100 overflow-y-auto -translate-x-full transform transition-all duration-300 hs-overlay-open:translate-x-0 lg:bottom-0 lg:end-auto lg:z-30 lg:block lg:translate-x-0 rtl:translate-x-full rtl:hs-overlay-open:translate-x-0 rtl:lg:translate-x-0 print:hidden [--body-scroll:true] [--overlay-backdrop:true] lg:[--overlay-backdrop:false]"
>
    <div class="flex flex-col h-full">
        <!-- Sidenav Logo -->
        <div class="sticky top-0 flex min-h-topbar items-center justify-start px-5">
            <a href="{% url 'pages:dashboard' %}" class="flex items-center gap-2">
                <!-- Add your logo image here (recommended size: 28×28) -->
                <!-- <img src="{% static 'images/logo.png' %}" alt="Cinema Logo" class="size-7 rounded-full"> -->

                <div class="size-6.5 rounded-full flex items-center justify-center text-primary ring ring-primary">
                    <i class="iconify tabler--circle-dot-filled size-6"></i>
                </div>

                <span class="font-black text-2xl/none text-default-800 uppercase tracking-wider">Cinema</span>
            </a>
        </div>

        <div class="relative min-h-0 grow">
            <div class="p-4 size-full scroll-layer" data-simplebar>
                                <!-- Menu -->
                <ul class="admin-menu hs-accordion-group flex w-full flex-col gap-1">
                    <li class="px-3 py-2 text-xs font-semibold text-default-400 flex items-center">
                        Main
                        <span class="h-px w-full bg-default-300/40 ms-3"></span>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'pages:dashboard' %}" class="group flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                            <i class="iconify tabler--chart-bar text-xl"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li class="px-3 py-2 text-xs font-semibold text-default-400 flex items-center">
                        Sistema Cine
                        <span class="h-px w-full bg-default-300/40 ms-3"></span>
                    </li>

                    <!-- Configuración Menu -->
                    <li class="menu-item hs-accordion">
                        <a href="javascript:void(0)" class="hs-accordion-toggle group flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5 hs-accordion-active:bg-default-900/5 hs-accordion-active:text-default-600">
                            <i class="iconify tabler--settings text-xl"></i>
                            <span class="menu-text">Configuración</span>
                            <span class="menu-arrow"></span>
                        </a>

                        <div class="hs-accordion-content hidden w-full overflow-hidden transition-[height] duration-300">
                            <ul class="mt-1 space-y-1">
                                <li class="menu-item">
                                    <a href="javascript:void(0)" class="flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                                        <i class="menu-dot"></i>
                                        <span class="menu-text">Usuarios</span>
                                    </a>
                                </li>
                                <li class="menu-item">
                                    <a href="javascript:void(0)" class="flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                                        <i class="menu-dot"></i>
                                        <span class="menu-text">Películas</span>
                                    </a>
                                </li>
                                <li class="menu-item">
                                    <a href="javascript:void(0)" class="flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                                        <i class="menu-dot"></i>
                                        <span class="menu-text">Salas</span>
                                    </a>
                                </li>
                                <li class="menu-item">
                                    <a href="javascript:void(0)" class="flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                                        <i class="menu-dot"></i>
                                        <span class="menu-text">Horarios</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </li>

                    <!-- Procesos Menu -->
                    <li class="menu-item hs-accordion">
                        <a href="javascript:void(0)" class="hs-accordion-toggle group flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5 hs-accordion-active:bg-default-900/5 hs-accordion-active:text-default-600">
                            <i class="iconify tabler--ticket text-xl"></i>
                            <span class="menu-text">Procesos</span>
                            <span class="menu-arrow"></span>
                        </a>

                        <div class="hs-accordion-content hidden w-full overflow-hidden transition-[height] duration-300">
                            <ul class="mt-1 space-y-1">
                                <li class="menu-item">
                                    <a href="javascript:void(0)" class="flex items-center gap-x-2 rounded-md px-3 py-2 text-sm font-medium text-default-600 transition-all hover:bg-default-900/5">
                                        <i class="menu-dot"></i>
                                        <span class="menu-text">Compra de Ticket</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </li>
                </ul>

                <div id="upgrade-alert" class="my-10 mx-3 hs-removing:translate-y-5 hs-removing:opacity-0 transition duration-300">
                    <div class="relative p-6 rounded-lg bg-linear-to-br from-primary/10 to-indigo-500/10 text-center">
                        <!-- Close button (top-right) -->
                        <button data-hs-remove-element="#upgrade-alert" type="button" class="absolute top-2 end-2 size-6 rounded bg-primary/10 text-primary flex items-center justify-center">
                            <i class="iconify tabler--x text-sm"></i>
                        </button>

                        <!-- Icon -->
                        <div class="flex justify-center mb-4">
                            <div class="flex items-center justify-center size-12 rounded-full bg-sky-500/15 text-sky-500">
                                <i class="iconify tabler--sparkles text-2xl"></i>
                            </div>
                        </div>

                        <!-- Content -->
                        <h5 class="mb-2 text-base font-semibold text-default-800">Unlock More Power</h5>

                        <p class="mb-4 text-sm text-default-500">Enable professional Grade reports and extended capabilities.</p>

                        <!-- CTA -->
                        <a href="javascript:void(0);" class="inline-flex items-center gap-1.5 px-4 py-1.5 text-sm font-semibold rounded bg-secondary text-white hover:bg-secondary/90 transition-all">
                            <i class="iconify tabler--arrow-up-right text-base"></i>
                            Upgrade
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</aside>
<!-- End Sidebar -->
